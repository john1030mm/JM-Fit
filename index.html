<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0066EE">
  <title>JM-Fit Tracker</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
    body{
      font-family: Arial, sans-serif;
      margin:0;
      background:#f3f5f7;
      color:#111;
    }
    header{
      background:#0066EE;
      color:white;
      padding:18px;
      text-align:center;
      font-size:28px;
      font-weight:bold;
    }
    .container{
      max-width:700px;
      margin:auto;
      padding:16px;
    }
    .card{
      background:white;
      padding:16px;
      border-radius:16px;
      margin-bottom:16px;
      box-shadow:0 2px 8px rgba(0,0,0,.08);
    }
    input,select,button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #ccc;
      box-sizing:border-box;
    }
    button{
      background:#0066EE;
      color:white;
      border:none;
      font-weight:bold;
      cursor:pointer;
    }
    .totals{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }
    .macro{
      background:#eef4f8;
      padding:14px;
      border-radius:12px;
      text-align:center;
    }
    .meal{
      border-bottom:1px solid #eee;
      padding:10px 0;
    }
    .topbar{
      display:flex;
      gap:10px;
    }
  </style>
</head>
<body>
<header>JM-Fit</header>

<div class="container">

<div class="card">
  <div class="topbar">
    <button onclick="toggleLang()">AR / EN</button>
  </div>

  <select id="foodSelect"></select>
  <input type="number" id="grams" placeholder="Amount in grams">
  <button onclick="addMeal()">Add Meal</button>
</div>

<div class="card">
  <h2 id="dailyTitle">Daily Totals</h2>
  <div class="totals">
    <div class="macro"><b>Calories</b><br><span id="calories">0</span></div>
    <div class="macro"><b>Protein</b><br><span id="protein">0</span> g</div>
    <div class="macro"><b>Carbs</b><br><span id="carbs">0</span> g</div>
    <div class="macro"><b>Fat</b><br><span id="fat">0</span> g</div>
  </div>
</div>

<div class="card">
  <h2 id="mealsTitle">Today's Meals</h2>
  <div id="meals"></div>
</div>

<div class="card">
  <h2 id="customTitle">Add Custom Food</h2>
  <input id="customName" placeholder="Food name">
  <input id="customCalories" type="number" placeholder="Calories / 100g">
  <input id="customProtein" type="number" placeholder="Protein / 100g">
  <input id="customCarbs" type="number" placeholder="Carbs / 100g">
  <input id="customFat" type="number" placeholder="Fat / 100g">
  <button onclick="addCustomFood()">Save Food</button>
</div>

<div class="card" style="background: #1e1e1e; color: white; text-align: center;">
  <h3 style="margin-top: 0; color: #fff; font-size: 18px;">إدارة البيانات (النسخ الاحتياطي)</h3>
  <p style="font-size: 12px; color: #aaa; margin-bottom: 15px;">احفظ أكلاتك برة التطبيق عشان تضمن إنها متضيعش أبداً</p>
  <button onclick="exportData()" style="background-color: #0066EE; margin-bottom: 10px;">نسخ البيانات كنص</button>
  <button onclick="importData()" style="background-color: #28a745;">استعادة البيانات</button>
</div>

</div>

<script>
let lang = localStorage.getItem('lang') || 'en';

let foods = JSON.parse(localStorage.getItem('foods')) || [
  {name:"White Rice", calories:130, protein:2.7, carbs:28, fat:0.3},
  {name:"Chicken Breast", calories:165, protein:31, carbs:0, fat:3.6},
  {name:"Egg", calories:155, protein:13, carbs:1.1, fat:11},
  {name:"Oats", calories:389, protein:17, carbs:66, fat:7}
];

let meals = JSON.parse(localStorage.getItem('meals')) || [];

function save(){
  localStorage.setItem('foods', JSON.stringify(foods));
  localStorage.setItem('meals', JSON.stringify(meals));
}

function renderFoods(){
  const select = document.getElementById('foodSelect');
  select.innerHTML = '';
  foods.forEach((food,i)=>{
    let option = document.createElement('option');
    option.value=i;
    option.textContent=food.name;
    select.appendChild(option);
  });
}

function addMeal(){
  const index = document.getElementById('foodSelect').value;
  const grams = parseFloat(document.getElementById('grams').value);

  if(!grams) return;

  const food = foods[index];
  const factor = grams/100;

  meals.push({
    name: food.name,
    grams,
    calories:(food.calories*factor).toFixed(1),
    protein:(food.protein*factor).toFixed(1),
    carbs:(food.carbs*factor).toFixed(1),
    fat:(food.fat*factor).toFixed(1)
  });

  save();
  renderMeals();
}

function renderMeals(){
  const mealsDiv = document.getElementById('meals');
  mealsDiv.innerHTML='';

  let totalC=0,totalP=0,totalCarb=0,totalF=0;

  meals.forEach((meal,index)=>{
    totalC += parseFloat(meal.calories);
    totalP += parseFloat(meal.protein);
    totalCarb += parseFloat(meal.carbs);
    totalF += parseFloat(meal.fat);

    const div=document.createElement('div');
    div.className='meal';
    div.innerHTML=`
      <b>${meal.name}</b> - ${meal.grams}g<br>
      ${meal.calories} kcal |
      P: ${meal.protein}g |
      C: ${meal.carbs}g |
      F: ${meal.fat}g
    `;
    mealsDiv.appendChild(div);
  });

  document.getElementById('calories').textContent=totalC.toFixed(1);
  document.getElementById('protein').textContent=totalP.toFixed(1);
  document.getElementById('carbs').textContent=totalCarb.toFixed(1);
  document.getElementById('fat').textContent=totalF.toFixed(1);
}

function addCustomFood(){
  const food = {
    name:document.getElementById('customName').value,
    calories:parseFloat(document.getElementById('customCalories').value),
    protein:parseFloat(document.getElementById('customProtein').value),
    carbs:parseFloat(document.getElementById('customCarbs').value),
    fat:parseFloat(document.getElementById('customFat').value)
  };

  if(!food.name) return;

  foods.push(food);
  save();
  renderFoods();
  alert(lang==='en' ? 'Food Added' : 'تم إضافة الأكلة');
}

function toggleLang(){
  lang = lang === 'en' ? 'ar' : 'en';
  localStorage.setItem('lang', lang);

  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

  if(lang==='ar'){
    document.getElementById('dailyTitle').textContent='إجمالي اليوم';
    document.getElementById('mealsTitle').textContent='وجبات اليوم';
    document.getElementById('customTitle').textContent='إضافة أكلة جديدة';
  }else{
    document.getElementById('dailyTitle').textContent='Daily Totals';
    document.getElementById('mealsTitle').textContent="Today's Meals";
    document.getElementById('customTitle').textContent='Add Custom Food';
  }
}

// دالات النسخ الاحتياطي والاستعادة المضافة
function exportData() {
    const allData = {};
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        allData[key] = localStorage.getItem(key);
    }
    const jsonString = JSON.stringify(allData);
    
    navigator.clipboard.writeText(jsonString).then(() => {
        alert("✅ تم نسخ أكلاتك بنجاح! افتح تطبيق النوتس في موبايلك واعمل (Paste) واحفظ النص عندك.");
    }).catch(err => {
        prompt("اضغط مطولاً وانسخ هذا النص واحفظه عندك في النوتس:", jsonString);
    });
}

function importData() {
    const jsonString = prompt("قم بلصق (Paste) النص الاحتياطي الذي حفظته سابقاً هنا:");
    if (jsonString) {
        try {
            const parsedData = JSON.parse(jsonString);
            localStorage.clear();
            for (const key in parsedData) {
                localStorage.setItem(key, parsedData[key]);
            }
            alert("🎉 تم استعادة جميع أكلاتك وبياناتك بنجاح!");
            window.location.reload();
        } catch (e) {
            alert("❌ عذراً، النص الذي أدخلته غير صحيح.");
        }
    }
}

renderFoods();
renderMeals();
toggleLang();
toggleLang();
</script>

</body>
</html>
